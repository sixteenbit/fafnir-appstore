services:
  opengist:
    image: ghcr.io/thomiceli/opengist:1.13.1
    environment:
      - TZ=${TZ}
      - UID=1000
      - GID=1000
      - OG_LOG_LEVEL=info
      - OG_SECRET_KEY=${OG_SECRET_KEY}
      # Auto-derives from Runtipi's domain: LAN → http://ip:port, exposed → https://your-domain.
      # Override field only needed when an external proxy/tunnel hostname differs from that.
      - OG_EXTERNAL_URL=${OG_EXTERNAL_URL:-${APP_PROTOCOL:-http}://${APP_DOMAIN}}
    volumes:
      - ${APP_DATA_DIR}/data/opengist:/opengist
    restart: unless-stopped
    x-runtipi:
      is_main: true
      internal_port: 6157

x-runtipi:
  schema_version: 2
  overrides: []
