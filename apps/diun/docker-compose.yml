services:
  diun:
    image: crazymax/diun:4.33.0
    command: serve
    x-runtipi:
      is_main: true
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
      - DIUN_WATCH_WORKERS=20
      - DIUN_WATCH_SCHEDULE=${DIUN_WATCH_SCHEDULE:-0 */6 * * *}
      - DIUN_WATCH_JITTER=30s
      - DIUN_PROVIDERS_DOCKER=true
      - DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT=${DIUN_WATCH_BY_DEFAULT:-false}
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro

x-runtipi:
  schema_version: 2
  overrides: []
