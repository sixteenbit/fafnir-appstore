services:
  # Headless daemon that extracts completed downloads for the *arr apps.
  # It mounts the same ${ROOT_FOLDER_HOST}/media volume as the official Runtipi
  # Sonarr/Radarr apps, so the paths those apps report via their API resolve to
  # the same files here. Runs as 1000:1000 to match the files those apps write.
  # Its built-in web server (enabled below) serves a status page + Prometheus
  # metrics on 5656, which is what Runtipi/Traefik routes the app domain to.
  unpackerr:
    image: golift/unpackerr:0.15.2
    user: "1000:1000"
    environment:
      - TZ=${TZ}
      # Enable the web server so there is a port to route to.
      - UN_WEBSERVER_METRICS=true
      - UN_WEBSERVER_LISTEN_ADDR=0.0.0.0:5656
      # *arr integrations (left blank if the form field is empty).
      - UN_SONARR_0_URL=${UN_SONARR_0_URL}
      - UN_SONARR_0_API_KEY=${UN_SONARR_0_API_KEY}
      - UN_RADARR_0_URL=${UN_RADARR_0_URL}
      - UN_RADARR_0_API_KEY=${UN_RADARR_0_API_KEY}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      # Same media root the official *arr apps mount, so download paths match.
      - ${ROOT_FOLDER_HOST}/media:/media
    restart: unless-stopped
    x-runtipi:
      is_main: true
      internal_port: 5656

x-runtipi:
  schema_version: 2
  overrides: []
